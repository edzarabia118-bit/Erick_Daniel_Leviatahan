<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cargando | Adeenca</title>
    <style>
        :root {
            --bg: #f3f9fe;
            --ink: #1f2937;
            --accent: #0ea5e9;
            --coffee: #5b3924;
            --steel: #cfd8e3;
            --shadow: rgba(0, 0, 0, 0.12);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: radial-gradient(circle at 30% 20%, #ffffff 0%, var(--bg) 65%);
            color: var(--ink);
            font-family: "Poppins", "Segoe UI", sans-serif;
        }

        .loader-wrap {
            width: min(92vw, 520px);
            text-align: center;
            padding: 22px;
        }

        h1 {
            font-size: 1.6rem;
            margin-bottom: 12px;
            color: #0f172a;
        }

        .scene {
            position: relative;
            margin: 12px auto 18px;
            width: 320px;
            height: 180px;
        }

        .machine {
            position: absolute;
            left: 10px;
            bottom: 24px;
            width: 180px;
            height: 120px;
            background: linear-gradient(145deg, #e6edf6, var(--steel));
            border-radius: 16px;
            box-shadow: 0 10px 20px var(--shadow);
        }

        .machine::before {
            content: "";
            position: absolute;
            top: 14px;
            left: 14px;
            width: 62px;
            height: 20px;
            border-radius: 8px;
            background: #93a4b8;
        }

        .machine::after {
            content: "";
            position: absolute;
            right: 18px;
            top: 18px;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: #eff5fb;
            border: 6px solid #94a6bb;
        }

        .spout {
            position: absolute;
            left: 132px;
            top: 56px;
            width: 54px;
            height: 10px;
            background: #8ca0b6;
            border-radius: 6px;
        }

        .stream {
            position: absolute;
            left: 175px;
            top: 67px;
            width: 8px;
            height: 56px;
            border-radius: 99px;
            background: linear-gradient(to bottom, #7f5737, #5b3924);
            transform-origin: top;
            animation: pour 1.3s ease-in-out infinite;
        }

        .cup {
            position: absolute;
            right: 24px;
            bottom: 24px;
            width: 88px;
            height: 60px;
            border-radius: 0 0 14px 14px;
            background: #ffffff;
            border: 4px solid #d4dce7;
            overflow: hidden;
        }

        .cup::before {
            content: "";
            position: absolute;
            right: -16px;
            top: 15px;
            width: 18px;
            height: 22px;
            border: 4px solid #d4dce7;
            border-left: 0;
            border-radius: 0 12px 12px 0;
            background: transparent;
        }

        .coffee-fill {
            position: absolute;
            left: 0;
            bottom: 0;
            width: 100%;
            height: 0%;
            background: linear-gradient(to top, #5b3924, #7a5233);
            animation: fill 4.8s linear forwards;
        }

        .steam {
            position: absolute;
            left: 228px;
            bottom: 86px;
            width: 2px;
            height: 30px;
            background: rgba(120, 120, 120, 0.35);
            border-radius: 99px;
            animation: steam 1.8s ease-in-out infinite;
        }

        .steam.s2 { left: 244px; animation-delay: .35s; }
        .steam.s3 { left: 260px; animation-delay: .7s; }

        .progress {
            width: 100%;
            height: 14px;
            border-radius: 99px;
            background: #dbe7f3;
            overflow: hidden;
            box-shadow: inset 0 1px 4px rgba(0, 0, 0, 0.08);
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            border-radius: inherit;
            background: linear-gradient(90deg, #0284c7, var(--accent));
            animation: load 4.8s linear forwards;
        }

        .status {
            margin-top: 10px;
            font-weight: 600;
            color: #334155;
        }

        @keyframes pour {
            0%, 100% { transform: scaleY(.3); opacity: .3; }
            40%, 70% { transform: scaleY(1); opacity: 1; }
        }

        @keyframes fill {
            from { height: 0%; }
            to { height: 78%; }
        }

        @keyframes load {
            from { width: 0%; }
            to { width: 100%; }
        }

        @keyframes steam {
            0% { transform: translateY(0); opacity: 0; }
            35% { opacity: .55; }
            100% { transform: translateY(-24px); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="loader-wrap">
        <h1>Preparando tu café...</h1>
        <div class="scene" aria-hidden="true">
            <div class="machine"></div>
            <div class="spout"></div>
            <div class="stream"></div>
            <div class="cup">
                <div class="coffee-fill"></div>
            </div>
            <div class="steam"></div>
            <div class="steam s2"></div>
            <div class="steam s3"></div>
        </div>

        <div class="progress">
            <div class="progress-bar"></div>
        </div>
        <p class="status">Cargando sistema...</p>
    </div>

    <script>
        setTimeout(() => {
            window.location.href = 'login.php';
        }, 5000);
    </script>
</body>
</html>
